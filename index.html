<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linktree by Kiora</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a0a2e;
      --card-bg:   #1e1030;
      --link-bg:   #2a1a42;
      --link-hover:#341f52;
      --border:    rgba(160, 80, 255, 0.25);
      --glow:      rgba(140, 60, 255, 0.55);
      --accent:    #a855f7;
      --accent2:   #7c3aed;
      --text:      #f0e6ff;
      --muted:     #9e8ab5;
      --arrow:     #a855f7;
      --red:       #ff3b5c;
    }

    body {
      min-height: 100vh;
      background: #000;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    /* Video-Hintergrund */
    .bg-video-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
      background: #000;
    }

    .bg-video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* rot-lila Abdunkelung über dem Video, damit die Karte gut lesbar bleibt */
    .bg-video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(74,15,62,0.55) 0%, rgba(10,4,16,0.78) 70%);
      pointer-events: none;
    }

    /* Lautstärkeregler oben links – Glassmorphism Pille */
    .volume-control {
      position: fixed;
      top: 1.1rem;
      left: 1.1rem;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      width: 190px;
      height: 34px;
      padding: 0 0.85rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255, 255, 255, 0.45);
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.25),
        inset 0 1px 1px rgba(255,255,255,0.2);
      overflow: hidden;
    }

    /* subtiler Lichtschimmer oben */
    .volume-control::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
    }

    .volume-btn {
      background: none;
      border: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      position: relative;
      z-index: 2;
      padding: 0;
    }

    .volume-btn svg { width: 18px; height: 18px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25)); }

    .volume-control input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      position: relative;
      z-index: 2;
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(to right, #ffffff 0%, #ffffff var(--vol, 100%), rgba(255,255,255,0.28) var(--vol, 100%), rgba(255,255,255,0.28) 100%);
      outline: none;
      cursor: pointer;
      box-shadow: inset 0 1px 2px rgba(5,30,70,0.25);
    }

    .volume-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 4px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    .volume-control input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border: none;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 4px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    .volume-control input[type="range"]::-moz-range-track {
      height: 6px;
      border-radius: 999px;
      background: transparent;
    }

    .volume-control input[type="range"]::-moz-range-progress {
      background: #ffffff;
      height: 6px;
      border-radius: 999px;
    }

    /* langsam wabernde Hintergrund-Blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }

    .bg-blob.b1 {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(168,85,247,0.55), transparent 70%);
      top: -10%;
      left: -8%;
      animation: blobMove1 22s ease-in-out infinite;
    }

    .bg-blob.b2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,59,92,0.4), transparent 70%);
      bottom: -15%;
      right: -10%;
      animation: blobMove2 26s ease-in-out infinite;
    }

    .bg-blob.b3 {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(124,58,237,0.5), transparent 70%);
      top: 40%;
      left: 60%;
      animation: blobMove3 30s ease-in-out infinite;
    }

    @keyframes blobMove1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(60px, 40px) scale(1.15); }
      66%      { transform: translate(-30px, 70px) scale(0.95); }
    }

    @keyframes blobMove2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(-50px, -60px) scale(1.1); }
      66%      { transform: translate(40px, -20px) scale(0.9); }
    }

    @keyframes blobMove3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-70px, 30px) scale(1.2); }
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 1.75rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow:
        0 0 0 1px rgba(168, 85, 247, 0.15),
        0 0 40px var(--glow),
        0 0 80px rgba(100, 30, 200, 0.2);
      position: relative;
    }

    /* top icons */
    .top-icons {
      position: absolute;
      top: 1.1rem;
      right: 1.1rem;
      display: flex;
      gap: 0.5rem;
    }

    .top-icons button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.2s, color 0.2s;
    }

    .top-icons button:hover { background: rgba(168,85,247,0.18); color: var(--accent); }

    .top-icons svg { width: 16px; height: 16px; }

    /* avatar */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
      position: relative;
    }

    /* pulsierender Glow-Ring hinter dem Avatar */
    .avatar-wrap::before {
      content: "";
      position: absolute;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(168,85,247,0.55);
      animation: avatarPulse 2.4s ease-out infinite;
      pointer-events: none;
    }

    @keyframes avatarPulse {
      0%   { box-shadow: 0 0 0 0 rgba(168,85,247,0.55); }
      70%  { box-shadow: 0 0 0 18px rgba(168,85,247,0); }
      100% { box-shadow: 0 0 0 0 rgba(168,85,247,0); }
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2.5px solid var(--accent);
      box-shadow: 0 0 18px var(--glow);
      object-fit: cover;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      position: relative;
      z-index: 1;
    }

    .profile-name {
      text-align: center;
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin-bottom: 0.35rem;
    }

    .profile-bio {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 1.75rem;
    }

    /* links */
    .links { display: flex; flex-direction: column; gap: 0.7rem; }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      background: var(--link-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.75rem 1rem;
      text-decoration: none;
      color: var(--text);
      transition: background 0.18s, box-shadow 0.18s, transform 0.15s;
      cursor: pointer;
    }

    .link-item:hover {
      background: var(--link-hover);
      box-shadow: 0 0 14px rgba(168,85,247,0.3);
      transform: translateY(-1px);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(168,85,247,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
    }

    .link-icon svg { width: 18px; height: 18px; }

    .link-text { flex: 1; }
    .link-title { font-weight: 600; font-size: 0.9rem; }
    .link-url   { font-size: 0.73rem; color: var(--muted); margin-top: 1px; }

    .link-arrow { color: var(--arrow); flex-shrink: 0; }
    .link-arrow svg { width: 18px; height: 18px; }

    /* add button hint */
    .add-hint {
      position: absolute;
      left: -2.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 1.4rem;
      line-height: 1;
    }

    /* cursor glow that follows the mouse */
    .cursor-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle, rgba(168,85,247,0.20) 0%, rgba(124,58,237,0.08) 40%, transparent 70%);
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    /* small dot that sits exactly on the cursor for a crisp accent */
    .cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--glow), 0 0 20px var(--glow);
      pointer-events: none;
      z-index: 1;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease-out, opacity 0.2s;
      will-change: transform;
    }

    .card {
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 0.12s ease-out;
      z-index: 2;
    }

    .link-item {
      will-change: transform;
    }

    .link-icon, .link-arrow {
      transition: transform 0.15s ease-out;
    }

    /* gestaffeltes Fade-In-Intro beim Laden */
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeInUp 0.7s ease forwards;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card.fade-in        { animation: cardFadeIn 0.8s ease forwards; opacity: 0; transform: translateY(24px) scale(0.97); }
    @keyframes cardFadeIn { to { opacity: 1; transform: translateY(0) scale(1); } }

    /* Funken-Partikel beim Klick auf einen Link */
    .spark-particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--glow), 0 0 12px var(--glow);
      pointer-events: none;
      z-index: 50;
      will-change: transform, opacity;
    }
  </style>
</head>
<body>

  <div style="position:fixed;bottom:1rem;left:0;right:0;text-align:center;font-size:0.72rem;color:rgba(255,255,255,0.2);letter-spacing:0.05em;font-family:'Inter',sans-serif;">made by eistee</div>

  <!-- weicher Lichtschein, der der Maus folgt -->
  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <script>
    // Versucht das Hintergrundvideo MIT Ton automatisch zu starten und
    // verbindet das Video mit dem Lautstärkeregler oben links.
    // Browser blockieren Autoplay mit Ton oft, bis der Nutzer einmal
    // mit der Seite interagiert hat – daher der Fallback.
    (function () {
      const video        = document.getElementById('bgVideo');
      const volumeBtn     = document.getElementById('volumeBtn');
      const volumeSlider  = document.getElementById('volumeSlider');
      const volumeIcon    = document.getElementById('volumeIcon');

      let lastVolume = 1; // letzte Lautstärke > 0, zum Wiederherstellen

      function updateIcon(vol) {
        // Icon je nach Lautstärke: stumm / leise / laut
        if (vol === 0) {
          volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>';
        } else if (vol < 0.5) {
          volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>';
        } else {
          volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>';
        }
      }

      function applyVolume(vol) {
        vol = Math.max(0, Math.min(1, vol));
        video.volume = vol;
        video.muted = vol === 0;
        if (vol > 0) lastVolume = vol;
        volumeSlider.value = Math.round(vol * 100);
        volumeSlider.style.setProperty('--vol', (vol * 100) + '%');
        updateIcon(vol);
      }

      function tryPlayWithSound() {
        video.muted = false;
        video.volume = 1;
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise
            .then(() => {
              applyVolume(1);
            })
            .catch(() => {
              // Autoplay mit Ton wurde blockiert -> stumm starten,
              // Regler bleibt nutzbar, um Ton manuell zu aktivieren.
              video.muted = true;
              video.play().catch(() => {});
              applyVolume(0);
            });
        }
      }

      tryPlayWithSound();

      // Klick auf das Lautsprecher-Icon schaltet stumm / Ton wieder an
      volumeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (video.muted || video.volume === 0) {
          applyVolume(lastVolume || 1);
        } else {
          applyVolume(0);
        }
      });

      // Schieberegler steuert die Lautstärke live
      volumeSlider.addEventListener('input', (e) => {
        const vol = parseInt(e.target.value, 10) / 100;
        applyVolume(vol);
      });

      // Erste Interaktion irgendwo auf der Seite nutzen, um Ton
      // freizuschalten, falls Autoplay mit Sound blockiert wurde.
      function unlockOnFirstInteraction() {
        if (video.muted) {
          applyVolume(lastVolume || 1);
        }
        document.removeEventListener('click', unlockOnFirstInteraction);
        document.removeEventListener('touchstart', unlockOnFirstInteraction);
      }
      document.addEventListener('click', unlockOnFirstInteraction, { once: true });
      document.addEventListener('touchstart', unlockOnFirstInteraction, { once: true });
    })();

    const glow = document.getElementById('cursorGlow');
    const dot  = document.getElementById('cursorDot');
    const card = document.querySelector('.card');

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let glowX = mouseX, glowY = mouseY;

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      dot.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
    });

    // sanftes Nachziehen des großen Glows (lerp) für einen weichen, schwebenden Effekt
    function animateGlow() {
      glowX += (mouseX - glowX) * 0.08;
      glowY += (mouseY - glowY) * 0.08;
      glow.style.transform = `translate(${glowX}px, ${glowY}px) translate(-50%, -50%)`;
      requestAnimationFrame(animateGlow);
    }
    animateGlow();

    // 3D-Tilt der Karte je nach Mausposition relativ zur Kartenmitte
    // Fade-in-Klasse nach Ablauf entfernen, damit die Animation den
    // späteren JS-Tilt-Transform nicht mehr blockiert
    if (card) {
      card.addEventListener('animationend', () => {
        card.classList.remove('fade-in');
      }, { once: true });
    }

    if (card) {
      window.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) / (rect.width / 2);
        const dy = (e.clientY - cy) / (rect.height / 2);

        const maxTilt = 8; // Grad
        const rotateY = Math.max(-1, Math.min(1, dx)) * maxTilt;
        const rotateX = Math.max(-1, Math.min(1, dy)) * -maxTilt;

        card.style.transform = `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      });

      window.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
      });
    }

    // kleiner Magnet-Effekt: Icon & Pfeil ziehen sanft zur Maus innerhalb des Link-Items
    document.querySelectorAll('.link-item').forEach((item) => {
      const icon = item.querySelector('.link-icon');
      const arrow = item.querySelector('.link-arrow');

      item.addEventListener('mousemove', (e) => {
        const rect = item.getBoundingClientRect();
        const relX = (e.clientX - rect.left - rect.width / 2) / (rect.width / 2);
        const relY = (e.clientY - rect.top - rect.height / 2) / (rect.height / 2);

        const strength = 4; // px
        if (icon)  icon.style.transform  = `translate(${relX * strength}px, ${relY * strength}px)`;
        if (arrow) arrow.style.transform = `translate(${relX * strength * 1.5}px, ${relY * strength}px)`;
      });

      item.addEventListener('mouseleave', () => {
        if (icon)  icon.style.transform  = 'translate(0, 0)';
        if (arrow) arrow.style.transform = 'translate(0, 0)';
      });

      // Funken-Partikel beim Klick
      item.addEventListener('click', (e) => {
        const originX = e.clientX;
        const originY = e.clientY;
        const count = 10;

        for (let i = 0; i < count; i++) {
          const particle = document.createElement('div');
          particle.className = 'spark-particle';
          particle.style.left = `${originX}px`;
          particle.style.top = `${originY}px`;
          document.body.appendChild(particle);

          const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
          const distance = 30 + Math.random() * 40;
          const dx = Math.cos(angle) * distance;
          const dy = Math.sin(angle) * distance;

          const start = performance.now();
          const duration = 500 + Math.random() * 200;

          function animateParticle(now) {
            const t = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - t, 2);
            particle.style.transform = `translate(${dx * ease}px, ${dy * ease}px)`;
            particle.style.opacity = `${1 - t}`;
            if (t < 1) {
              requestAnimationFrame(animateParticle);
            } else {
              particle.remove();
            }
          }
          requestAnimationFrame(animateParticle);
        }
      });
    });
  </script>
</body>
</html>
